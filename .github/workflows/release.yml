name: Release

# Triggers on version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

env:
  BINARY_NAME: discord-rumi
  CARGO_TERM_COLOR: always

jobs:
  # ── Build jobs (run in parallel) ────────────────────────────────────────────

  build-x86_64-linux-gnu:
    name: Build (x86_64-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-linux-gnu-${{ hashFiles('Cargo.lock') }}
          restore-keys: x86_64-linux-gnu-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }} \
             ${{ env.BINARY_NAME }}-x86_64-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-linux-gnu
          path: ${{ env.BINARY_NAME }}-x86_64-linux-gnu
          retention-days: 1

  build-x86_64-linux-musl:
    name: Build (x86_64-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-linux-musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: x86_64-linux-musl-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }} \
             ${{ env.BINARY_NAME }}-x86_64-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-linux-musl
          path: ${{ env.BINARY_NAME }}-x86_64-linux-musl
          retention-days: 1

  build-aarch64-linux-gnu:
    name: Build (aarch64-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-linux-gnu-${{ hashFiles('Cargo.lock') }}
          restore-keys: aarch64-linux-gnu-

      - name: Build release binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        run: |
          cp target/aarch64-unknown-linux-gnu/release/${{ env.BINARY_NAME }} \
             ${{ env.BINARY_NAME }}-aarch64-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-linux-gnu
          path: ${{ env.BINARY_NAME }}-aarch64-linux-gnu
          retention-days: 1

  # ── Release job (runs after all builds succeed) ──────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-x86_64-linux-gnu
      - build-x86_64-linux-musl
      - build-aarch64-linux-gnu
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          # Auto-generates changelog from commits since the previous tag.
          generate_release_notes: true
          files: |
            discord-rumi-x86_64-linux-gnu
            discord-rumi-x86_64-linux-musl
            discord-rumi-aarch64-linux-gnu
